workflow_name: invoice_autoposting
description: Extract and validate accounting data from invoices and receipts.
version: 0.1.0

states:
  - uploaded
  - ocr_failed
  - parsed
  - extracted
  - extraction_failed
  - validated
  - needs_review
  - approved
  - rejected
  - exported

input_schema: document_upload
output_schema: accounting_entry

tools:
  - chart_of_accounts
  - vendor_lookup

validators:
  - totals_match
  - required_fields_present
  - valid_date

exports:
  - csv
  - json

invoice_categories: []

extractable_fields:
  - vendor_name
  - invoice_number
  - invoice_date
  - currency
  - subtotal
  - tax_amount
  - total_amount
  - payment_terms
  - line_items

supported_languages:
  - auto
  - en
  - id
  - zh
  - es
  - fr
  - de

default_target_currency: USD
