services:
  frontend:
    build:
      context: ./apps/frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

  api:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - storage_data:/app/storage

  mlflow:
    build:
      context: .
    env_file:
      - .env
    command: ["mlflow", "ui", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "file:///app/storage/mlruns"]
    ports:
      - "5055:5000"
    volumes:
      - storage_data:/app/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opsfoundry}
      POSTGRES_USER: ${POSTGRES_USER:-opsfoundry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opsfoundry}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opsfoundry} -d ${POSTGRES_DB:-opsfoundry}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  storage_data:
